  baseline_parameters:
    simulation:
      start_time: 0
      # end_time is derived at load time from calendar.analysis_start_date and
      # calendar.analysis_end_date. Override explicitly only for tests or
      # calibration windows.
      time_step: 1
      output_time_step: 7
      burn_in_years: 60
      solver_method: RK45
      rtol: 1.0e-5
      atol: 1.0e-7
      n_jobs: -1
    calendar:
      enabled: true
      analysis_start_date: "2025-01-01"
      analysis_end_date: "2050-12-31"
      note: >
        Simulation time is stored as days since analysis_start_date; end_time is
        derived from (analysis_end_date - analysis_start_date). Output rows
        include calendar_date/calendar_year. Calibration overrides these dates
        to the observed surveillance window so modelled and observed annual
        cases align by real calendar year, with reporting intervals split across
        calendar-year boundaries. Start date set to 2025-01-01 to allow
        short-term out-of-sample validation against 2025 surveillance data
        before the forward projection period.
    age_groups:
      - label: infant_0_2m
        population: 260000
        vaccine_coverage: 0.10
        symptom_probability: 0.75
        reporting_rate: 0.60
      - label: infant_3_11m
        population: 980000
        vaccine_coverage: 0.65
        symptom_probability: 0.65
        reporting_rate: 0.50
      - label: child_1_4y
        population: 4800000
        vaccine_coverage: 0.92
        symptom_probability: 0.45
        reporting_rate: 0.25
      - label: child_5_9y
        population: 6000000
        vaccine_coverage: 0.90
        symptom_probability: 0.40
        reporting_rate: 0.18
      - label: adolescent_10_17y
        population: 9600000
        vaccine_coverage: 0.72
        symptom_probability: 0.28
        reporting_rate: 0.08
      - label: young_adult_18_39y
        population: 28000000
        vaccine_coverage: 0.40
        symptom_probability: 0.20
        reporting_rate: 0.05
      - label: middle_adult_40_64y
        population: 32000000
        vaccine_coverage: 0.30
        symptom_probability: 0.18
        reporting_rate: 0.03
      - label: elderly_65plus
        population: 18000000
        vaccine_coverage: 0.15
        symptom_probability: 0.25
        reporting_rate: 0.04
    contact_matrix:
      reciprocity_correction:
        enabled: true
        method: population_weighted_average
        tolerance: 0.05
      rows:
        - [5.5, 2.2, 1.5, 0.8, 0.4, 1.0, 0.5, 0.3]
        - [1.8, 6.2, 3.0, 1.5, 0.7, 1.2, 0.6, 0.3]
        - [0.9, 2.5, 9.5, 4.0, 1.8, 1.5, 0.8, 0.4]
        - [0.5, 1.2, 4.0, 11.0, 3.5, 1.2, 0.9, 0.4]
        - [0.3, 0.6, 1.8, 3.5, 10.5, 2.8, 1.5, 0.6]
        - [0.5, 0.8, 1.5, 1.2, 2.8, 7.0, 3.0, 1.0]
        - [0.3, 0.5, 0.8, 0.9, 1.5, 3.0, 6.5, 2.0]
        - [0.2, 0.3, 0.4, 0.4, 0.6, 1.0, 2.0, 4.5]
    transmission:
      beta_S: 0.010
      fitness_R: 1.00
      relative_infectiousness_asymptomatic: 0.35
      seasonal_amplitude: 0.18
      seasonal_phase: 30
      multi_year_amplitude: 0.00
      multi_year_period_years: 4.0
      multi_year_phase: 0
    importation:
      enabled: true
      rate_per_100k_per_year: 0.20
      resistant_fraction: 0.30
      age_distribution:
        infant_0_2m: 0.02
        infant_3_11m: 0.05
        child_1_4y: 0.12
        child_5_9y: 0.13
        adolescent_10_17y: 0.20
        young_adult_18_39y: 0.23
        middle_adult_40_64y: 0.16
        elderly_65plus: 0.09
    natural_history:
      latent_duration: 8.0
      infectious_duration_symptomatic: 21.0
      infectious_duration_asymptomatic: 14.0
      maternal_protection_duration: 90.0
      recovered_immunity_duration: 3285.0
      vaccine_protection_duration: 1825.0
    immunity_model:
      mode: maternal_dose_history
      waned_relative_effect: 0.35
      maternal_relative_effect: 0.75
      dose1_relative_effect: 0.45
      dose2_relative_effect: 0.75
      waned_vaccine_duration: 3650.0
      initial_recent_fraction: 0.35
      initial_recent_fraction_by_age:
        infant_0_2m: 1.00
        infant_3_11m: 0.85
        child_1_4y: 0.60
        child_5_9y: 0.45
        adolescent_10_17y: 0.25
        young_adult_18_39y: 0.12
        middle_adult_40_64y: 0.08
        elderly_65plus: 0.06
    observation_model:
      enabled: true
      structure: symptomatic_to_care_to_test_to_report
      note: >
        Runtime reported cases use the age-specific final reporting probabilities
        in age_groups/reporting_rate, with calibration allowed to multiply those
        probabilities. The explicit care/test/report split is retained as the
        intended observation contract for country calibration.
    resistance:
      target_prevalence_at_analysis_start: 0.30
      importation_fraction: 0.30
      rebalance_after_burn_in: true
      prevalence_anchor_rate_per_year: 2.0
      anchor_during_dynamics: false
      initial_resistance_prevalence_deprecated: true
    stochastic_resistance:
      enabled: true
      effective_population_size: 2000
      min_strain_fraction: 0.001
      random_seed: 20260515
      note: >
        Tau-leaping stochastic layer for resistance strain dynamics. The
        effective_population_size controls the magnitude of genetic drift:
        smaller values produce more stochastic fluctuation and slower fixation.
        A value of 2000 represents the effective number of independent
        transmission events determining strain composition per output time step,
        accounting for household clustering (SAR~0.8) that reduces the effective
        number of independent events well below the total infectious population.
        This addresses the known limitation that deterministic ODE models
        produce unrealistically fast resistance fixation (model: 2-3 years vs
        observed: 6-8 years in China) by introducing the genetic drift that
        naturally slows selection in finite populations.
    calibration:
      enabled: false
      default_country_profile: Australia
      method: staged_fast
      objective: negative_binomial_reporting_interval_cases
      dispersion: 50.0
      maxiter: 12
      n_starts: 1
      recent_years: 6
      mean_fit_penalty_weight: 50000.0
      simulation_overrides:
        burn_in_years: 5
        output_time_step: 30
        solver_method: RK45
        rtol: 1.0e-4
        atol: 1.0e-6
      relative_incidence_tolerance: 0.25
      fit_parameters:
        - transmission.beta_S
        - reporting_multiplier
        - transmission.seasonal_amplitude
        - importation.rate_per_100k_per_year
        - resistance.importation_fraction
    demography:
      enabled: true
      fixed_population_profile: true
      fixed_population_reference_age_group: infant_0_2m
      maternal_protection_proxy:
        enabled: true
        exit_age_groups:
          - infant_0_2m
        exit_to_compartment: S
        note: >
          Birth-entry M_protected is a proxy for short-lived maternally derived
          infant protection. It is converted back to susceptible when infants age
          out of 0-2 months so maternal antibodies are not treated as multi-year
          vaccine-derived immunity.
      age_bin_durations_years:
        infant_0_2m: 0.1667
        infant_3_11m: 0.75
        child_1_4y: 4.0
        child_5_9y: 5.0
        adolescent_10_17y: 8.0
        young_adult_18_39y: 22.0
        middle_adult_40_64y: 25.0
        elderly_65plus: 15.0
      birth_entry:
        S: 0.92
        V: 0.08
    routine_vaccination:
      enabled: true
      target_relaxation_rate_per_year: 2.0
    initial_conditions:
      initial_exposed_per_100k: 1.5
      initial_infectious_per_100k: 0.6
      initial_resistance_prevalence: 0.30
      seed_age_distribution:
        infant_0_2m: 0.03
        infant_3_11m: 0.07
        child_1_4y: 0.12
        child_5_9y: 0.13
        adolescent_10_17y: 0.20
        young_adult_18_39y: 0.22
        middle_adult_40_64y: 0.15
        elderly_65plus: 0.08
    treatment:
      treatment_rate_symptomatic: 0.025
      treatment_rate_asymptomatic: 0.002
      sensitive:
        infectious_duration_reduction: 0.20
        infectiousness_reduction: 0.15
      resistant:
        infectious_duration_reduction: 0.10
        infectiousness_reduction: 0.05
    PEP:
      coverage_household_contacts: 0.30
      effectiveness_sensitive: 0.70
      effectiveness_resistant: 0.10
      activation_prevalence: 0.00002
    reporting_rate_sensitivity:
      medium:
        multiplier: 1.0
        description: Baseline reporting rates as configured in country profiles.
      high:
        multiplier: 1.5
        description: Uniformly higher reporting (50% increase across all ages).
      low:
        multiplier: 0.5
        description: Uniformly lower reporting (50% decrease across all ages).
      age_biased:
        age_multipliers:
          infant_0_2m: 1.2
          infant_3_11m: 1.1
          child_1_4y: 0.9
          child_5_9y: 0.8
          adolescent_10_17y: 0.7
          young_adult_18_39y: 0.6
          middle_adult_40_64y: 0.5
          elderly_65plus: 0.6
        description: >
          Age-biased reporting where infant ascertainment is slightly higher
          and adult/adolescent ascertainment is lower than baseline.
      time_varying:
        multiplier: 1.0
        time_variation:
          start_multiplier: 0.5
          end_multiplier: 1.5
        description: >
          Linearly improving reporting over the analysis period (e.g. due to
          increased awareness, better diagnostics, or expanded testing).
      # --- Literature-anchored age-specific scenarios ---
      # These scenarios are derived from the quantitative evidence in
      # manuscript_notes/reporting_evidence_summary.md and the new
      # age-specific reporting literature review.
      infant_high_adult_very_low:
        age_multipliers:
          infant_0_2m: 1.0
          infant_3_11m: 0.9
          child_1_4y: 0.6
          child_5_9y: 0.5
          adolescent_10_17y: 0.3
          young_adult_18_39y: 0.2
          middle_adult_40_64y: 0.15
          elderly_65plus: 0.2
        description: >
          Strong age gradient: infant reporting near baseline but adolescent
          and adult reporting reduced to 3-5% absolute (consistent with
          Ontario capture-recapture: 11% of age 1+ cases reported, and
          England/Wales notification efficiency of 5-25% overall). This
          scenario tests whether the true infection burden in adults is
          substantially higher than reported cases suggest.
      infant_moderate_adult_minimal:
        age_multipliers:
          infant_0_2m: 0.7
          infant_3_11m: 0.6
          child_1_4y: 0.5
          child_5_9y: 0.4
          adolescent_10_17y: 0.2
          young_adult_18_39y: 0.1
          middle_adult_40_64y: 0.08
          elderly_65plus: 0.1
        description: >
          Extreme under-reporting scenario anchored to the lower end of
          literature estimates. Infant reporting at 35-42% (Ontario hospital
          study: 37%), school-age at 2-5%, adults at 0.5-2.5%. Represents
          passive surveillance systems without active case-finding.
      enhanced_surveillance:
        age_multipliers:
          infant_0_2m: 1.3
          infant_3_11m: 1.2
          child_1_4y: 1.4
          child_5_9y: 1.5
          adolescent_10_17y: 1.8
          young_adult_18_39y: 2.5
          middle_adult_40_64y: 2.5
          elderly_65plus: 2.0
        description: >
          Enhanced surveillance scenario where improved diagnostics (PCR
          availability, point-of-care testing) increase ascertainment,
          particularly in older age groups. Represents the effect of
          active surveillance programs or outbreak investigations.
      adult_focused_improvement:
        age_multipliers:
          infant_0_2m: 1.0
          infant_3_11m: 1.0
          child_1_4y: 1.0
          child_5_9y: 1.0
          adolescent_10_17y: 2.0
          young_adult_18_39y: 3.0
          middle_adult_40_64y: 3.0
          elderly_65plus: 2.5
        description: >
          Scenario where adult/adolescent reporting improves substantially
          (e.g. through Tdap booster awareness campaigns, expanded testing
          guidelines for prolonged cough). Tests sensitivity of total burden
          estimates to adult ascertainment improvements.
      china_passive_system:
        age_multipliers:
          infant_0_2m: 0.8
          infant_3_11m: 0.7
          child_1_4y: 0.5
          child_5_9y: 0.4
          adolescent_10_17y: 0.25
          young_adult_18_39y: 0.15
          middle_adult_40_64y: 0.12
          elderly_65plus: 0.15
        description: >
          Calibrated to Yiwu active-surveillance study (China) which found
          community incidence of 108.3/100k vs passive surveillance estimates
          far below this. Represents the gap between active and passive
          surveillance in a middle-income setting.
    baseline_vaccine_scenario: symptom_protective
    baseline_resistance_scenario: country_timeline
    baseline_country_profile: China

  vaccine_scenarios:
    no_vaccine:
      VE_sus: 0.00
      VE_sym: 0.00
      VE_inf: 0.00
      VE_dur: 0.00
      description: No vaccine protection.
    symptom_protective:
      VE_sus: 0.15
      VE_sym: 0.85
      VE_inf: 0.25
      VE_dur: 0.00
      description: >
        aP-like disease protection with moderate infection/transmission
        blocking. VE_inf = 0.25 represents the time-averaged effect of aP
        vaccination on onward infectiousness, accounting for rapid waning
        from initial ~50-60% to <10% within 3-5 years post-vaccination
        (Warfel et al. 2014 baboon model; Althouse & Scarpino 2015;
        McGirr & Fisman 2015 meta-analysis). This is a population-average
        across recently and distantly vaccinated individuals.
    infection_blocking:
      VE_sus: 0.70
      VE_sym: 0.85
      VE_inf: 0.40
      VE_dur: 0.10
      description: >
        Stronger reduction in susceptibility to infection. VE_inf = 0.40
        represents the upper range of current aP effectiveness against
        transmission in recently vaccinated individuals.
    transmission_blocking:
      VE_sus: 0.30
      VE_sym: 0.85
      VE_inf: 0.55
      VE_dur: 0.30
      description: >
        Strong reduction in onward infectiousness and duration. Represents
        an improved aP formulation or wP-like transmission blocking.
    next_generation:
      VE_sus: 0.80
      VE_sym: 0.90
      VE_inf: 0.65
      VE_dur: 0.40
      description: >
        Strong infection, symptom, and transmission protection. Represents
        a next-generation pertussis vaccine with mucosal immunity induction
        (e.g. live-attenuated nasal or outer membrane vesicle platforms).

  resistance_scenarios:
    country_timeline:
      target_prevalence_at_analysis_start: 0.30
      initial_resistance_prevalence: 0.30
      importation_fraction: 0.30
      rebalance_after_burn_in: true
      prevalence_anchor_rate_per_year: 2.0
      anchor_during_dynamics: false
      fitness_R: 1.00
      use_country_resistance_timeline: true
      description: >
        Country-specific macrolide resistance prevalence from
        data/raw/country_resistance_timeline.csv. Fitness set to 1.0 (neutral)
        based on epidemiological evidence: China MRBP rose from 36% (2016) to
        near-fixation (>99%, 2024) within 8 years, and the MT28-ptxP3 clone
        spread to Japan (83-88%, 2024-2025), France, and the US without
        apparent transmission disadvantage. Rapid fixation is inconsistent
        with a substantial fitness cost (Fu et al. EID 2024; Cai et al.
        medRxiv 2025; Fong et al. Lancet Microbe 2026). The fitness_grid
        and fitness_sensitivity scenarios explore the full range [0.70-1.25].
    low:
      target_prevalence_at_analysis_start: 0.05
      initial_resistance_prevalence: 0.05
      importation_fraction: 0.05
      rebalance_after_burn_in: true
      prevalence_anchor_rate_per_year: 2.0
      anchor_during_dynamics: false
      fitness_R: 1.00
      description: Low macrolide resistance prevalence with fitness-neutral strain.
    moderate:
      target_prevalence_at_analysis_start: 0.30
      initial_resistance_prevalence: 0.30
      importation_fraction: 0.30
      rebalance_after_burn_in: true
      prevalence_anchor_rate_per_year: 2.0
      anchor_during_dynamics: false
      fitness_R: 1.00
      description: Moderate macrolide resistance prevalence with fitness-neutral strain.
    high:
      target_prevalence_at_analysis_start: 0.70
      initial_resistance_prevalence: 0.70
      importation_fraction: 0.70
      rebalance_after_burn_in: true
      prevalence_anchor_rate_per_year: 2.0
      anchor_during_dynamics: false
      fitness_R: 1.00
      description: High macrolide resistance prevalence with fitness-neutral strain.
    very_high:
      target_prevalence_at_analysis_start: 0.95
      initial_resistance_prevalence: 0.95
      importation_fraction: 0.95
      rebalance_after_burn_in: true
      prevalence_anchor_rate_per_year: 2.0
      anchor_during_dynamics: false
      fitness_R: 1.00
      description: Very high macrolide resistance prevalence with fitness-neutral strain.
    # --- Fitness sensitivity scenarios ---
    # These explicitly test the assumption that resistance carries a fitness
    # cost, which is contradicted by the rapid global spread of MRBP.
    country_timeline_fitness_cost:
      target_prevalence_at_analysis_start: 0.30
      initial_resistance_prevalence: 0.30
      importation_fraction: 0.30
      rebalance_after_burn_in: true
      prevalence_anchor_rate_per_year: 2.0
      anchor_during_dynamics: false
      fitness_R: 0.85
      use_country_resistance_timeline: true
      description: >
        Country-timeline resistance with moderate fitness cost (15%). Retained
        as a sensitivity scenario representing the traditional assumption that
        ribosomal mutations impose a growth penalty. Contradicted by the
        observed rapid fixation in China and Japan but included to bound the
        optimistic end of resistance projections.
    country_timeline_fitness_advantage:
      target_prevalence_at_analysis_start: 0.30
      initial_resistance_prevalence: 0.30
      importation_fraction: 0.30
      rebalance_after_burn_in: true
      prevalence_anchor_rate_per_year: 2.0
      anchor_during_dynamics: false
      fitness_R: 1.10
      use_country_resistance_timeline: true
      description: >
        Country-timeline resistance with fitness advantage (10%). The MT28-ptxP3
        MRBP clone carries additional virulence-associated alleles (ptxA1, prn-
        negative, fim3-2) that may confer a selective advantage in partially
        vaccinated populations (Hu et al. 2025; genomic surveillance studies
        report co-selection of resistance and vaccine-escape alleles). This
        scenario tests whether a modest fitness advantage materially changes
        long-term resistance burden projections.
    high_fitness_advantage:
      target_prevalence_at_analysis_start: 0.70
      initial_resistance_prevalence: 0.70
      importation_fraction: 0.70
      rebalance_after_burn_in: true
      prevalence_anchor_rate_per_year: 2.0
      anchor_during_dynamics: false
      fitness_R: 1.15
      description: >
        High resistance prevalence with fitness advantage (15%). Worst-case
        scenario combining high initial resistance with a fitness-advantaged
        strain, representing the upper bound of resistant infection burden.
        Motivated by the observation that MRBP clones in China carry
        compensatory mutations and virulence factor combinations that may
        enhance transmissibility in the aP-vaccinated population context.

  intervention_scenarios:
    current:
      description: Current vaccination and standard macrolide treatment.
    higher_child_coverage:
      description: Increased routine childhood vaccine coverage.
      coverage_updates:
        infant_3_11m: 0.82
        child_1_4y: 0.96
        child_5_9y: 0.94
    adolescent_booster:
      description: Additional booster for school-age children and adolescents.
      coverage_updates:
        adolescent_10_17y: 0.90
      vaccine_overrides:
        VE_inf: 0.25
    maternal_immunization:
      description: >
        Direct infant protection through transplacental antibody transfer plus
        indirect (cocooning) protection from boosted maternal immunity. The
        coverage_updates for young_adult_18_39y represent the fraction of the
        age group with recently boosted immunity from pregnancy Tdap (~72%
        uptake among pregnant women, with ~4% of women pregnant per year and
        boosting lasting ~3-5 years, giving ~10-15% of the age group with
        recent boosting at any time, added to the baseline ~40% coverage).
        The contact_matrix_reduction captures the cocooning pathway: vaccinated
        mothers transmit less to their own infants, reducing the effective
        contact rate in the mother-infant dyad. Observational studies attribute
        ~20-30% of total infant protection to this indirect pathway
        (Amirthalingam et al. 2014; Skoff et al. 2017).
      coverage_updates:
        infant_0_2m: 0.72
        infant_3_11m: 0.78
        young_adult_18_39y: 0.55
      vaccine_overrides:
        maternal_VE_sus: 0.55
        maternal_VE_sym: 0.92
      natural_history_overrides:
        maternal_protection_duration: 180.0
      contact_matrix_reduction:
        # Reduce effective contacts from young_adult to infants by 30%
        # representing the cocooning effect: vaccinated mothers are less
        # likely to be infectious when in close contact with their infant
        source_age: young_adult_18_39y
        target_ages: [infant_0_2m, infant_3_11m]
        reduction_fraction: 0.30
    resistance_guided_treatment:
      description: Resistance testing plus alternative treatment for resistant infections.
      treatment_updates:
        resistant:
          infectious_duration_reduction: 0.45
          infectiousness_reduction: 0.35
        treatment_rate_symptomatic: 0.065
      pep_updates:
        effectiveness_resistant: 0.45
    next_generation_vaccine:
      description: Improved transmission-blocking vaccine.
      vaccine_scenario: next_generation
    combined_strategy:
      description: Maternal immunization, adolescent booster, and resistance-guided treatment.
      vaccine_scenario: transmission_blocking
      coverage_updates:
        infant_0_2m: 0.72
        infant_3_11m: 0.84
        adolescent_10_17y: 0.90
        young_adult_18_39y: 0.55
      vaccine_overrides:
        maternal_VE_sus: 0.55
        maternal_VE_sym: 0.92
      natural_history_overrides:
        maternal_protection_duration: 180.0
      treatment_updates:
        resistant:
          infectious_duration_reduction: 0.45
          infectiousness_reduction: 0.35
        treatment_rate_symptomatic: 0.065
      pep_updates:
        effectiveness_resistant: 0.45
      contact_matrix_reduction:
        source_age: young_adult_18_39y
        target_ages: [infant_0_2m, infant_3_11m]
        reduction_fraction: 0.30

  sensitivity_parameters:
    sample_size: 48
    random_seed: 20260430
    parameters:
      VE_sus:
        min: 0.10
        max: 0.70
        path: vaccine.VE_sus
      VE_sym:
        min: 0.40
        max: 0.95
        path: vaccine.VE_sym
      VE_inf:
        min: 0.05
        max: 0.60
        path: vaccine.VE_inf
        note: >
          Literature range for aP vaccine effect on onward infectiousness.
          Lower bound (0.05) represents fully waned protection; upper bound
          (0.60) represents recently vaccinated individuals. Meta-analyses
          suggest initial VE against infection of 40-60% waning to <10%
          within 3-5 years (McGirr & Fisman 2015; Warfel et al. 2014).
      VE_dur:
        min: 0.00
        max: 0.50
        path: vaccine.VE_dur
      infectious_duration_symptomatic:
        min: 14.0
        max: 28.0
        path: natural_history.infectious_duration_symptomatic
      infectious_duration_asymptomatic:
        min: 7.0
        max: 21.0
        path: natural_history.infectious_duration_asymptomatic
      waning_rate_vaccine:
        min: 0.00020
        max: 0.00110
        path: rates.waning_vaccine
      waning_rate_natural:
        min: 0.00010
        max: 0.00050
        path: rates.waning_natural
      relative_infectiousness_asymptomatic:
        min: 0.25
        max: 0.85
        path: transmission.relative_infectiousness_asymptomatic
      seasonal_amplitude:
        min: 0.05
        max: 0.35
        path: transmission.seasonal_amplitude
      multi_year_amplitude:
        min: 0.00
        max: 0.18
        path: transmission.multi_year_amplitude
      treatment_rate_symptomatic:
        min: 0.020
        max: 0.090
        path: treatment.treatment_rate_symptomatic
      PEP_coverage:
        min: 0.05
        max: 0.60
        path: PEP.coverage_household_contacts
      PEP_effectiveness_resistant:
        min: 0.00
        max: 0.50
        path: PEP.effectiveness_resistant
      fitness_R:
        min: 0.70
        max: 1.25
        path: transmission.fitness_R
      reporting_rate_multiplier:
        min: 0.50
        max: 1.50
        path: reporting_multiplier

  fitness_grid:
    random_seed: 20260510
    fitness_R_values: [0.70, 0.80, 0.85, 0.90, 0.95, 0.98, 1.00, 1.02, 1.05, 1.10, 1.15, 1.20, 1.25]
    VE_inf_values: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50, 0.55]
    description: >
      Continuous macrolide-resistant strain fitness stress test crossed with
      plausible-to-next-generation vaccine infectiousness effects. VE_inf is
      the reduction in onward infectiousness among infected vaccine-history
      origins, not protection against infection. The fitness grid now includes
      finer resolution around fitness_R = 1.0 (neutral) because epidemiological
      evidence from China (36% to >99% MRBP in 8 years), Japan (83-88% in
      2024-2025), and global MT28 spread suggests the true fitness is near or
      above 1.0. Values below 0.85 are retained for completeness but are
      increasingly inconsistent with observed resistance dynamics. VE_inf axis
      expanded from 5 to 11 uniform steps (0.05 increments) to improve heatmap
      resolution in Figure 3E/F panels.

  bayesian_uncertainty:
    random_seed: 20260510
    n_chains: 4
    warmup: 1500
    draws: 2500
    thin: 1
    proposal_scale: 1.0
    posterior_predictive_draws_per_country: 100
    dispersion: 50.0
    enable_time_varying_reporting: true
    note: >
      Bayesian uncertainty analysis using Adaptive Metropolis MCMC (Haario et al.
      2001) with Robbins-Monro step-size adaptation. The sampler uses a three-phase
      strategy: (1) 500-step componentwise exploration to build a reliable covariance
      estimate, (2) full multivariate AM with automatic step-size tuning targeting
      23.4% acceptance, (3) frozen-covariance sampling. Four chains of 1500 warmup +
      2500 post-warmup draws provide bulk ESS >400 per parameter with ~20%
      acceptance. Convergence is validated via split-R-hat and bulk/tail ESS
      (Vehtari et al. 2021); diagnostics are written to
      outputs/summaries/bayesian_convergence_diagnostics.csv. Priors are applied
      to uncertain epidemiologic, reporting, vaccine-mechanism, and resistance
      parameters; posterior predictive intervals report 95% credible intervals
      (not IQR). Stochastic observation variance from superspreading
      (Lloyd-Smith et al. 2005 overdispersion) and household clustering (Ball,
      Mollison & Scalia-Tomba 1997 design effect) is layered on top of each
      posterior draw by stochastic_overlay below, so the combined 95% CrI
      reflects both parameter uncertainty (addressing the Lavine et al. 2011
      sensitivity concern) and the structural heterogeneity that a deterministic
      ODE cannot represent directly. A k-sensitivity sweep demonstrates CrI
      robustness to the aggregate dispersion assumption.
    convergence_criteria:
      rhat_threshold: 1.05
      min_bulk_ess: 100
      min_tail_ess: 50
      note: >
        Convergence is assessed per-parameter per-country. Parameters with
        rank-normalized split-R-hat > 1.05 or bulk ESS < 100 are flagged.
        Reference: Vehtari et al. (2021) Bayesian Analysis 16(2):667-718.
    adaptive_metropolis:
      adaptation_start: 50
      mixing_fraction: 0.95
      epsilon: 1.0e-6
      note: >
        Adaptive Metropolis (Haario et al. 2001) learns the empirical
        covariance from chain history during warmup. After adaptation_start
        steps, the proposal is 95% adapted covariance + 5% initial diagonal
        for ergodicity. The adapted covariance captures correlations such as
        the strong negative correlation between beta_S and reporting_multiplier.
    priors:
      log_beta_S_sd: 0.40
      log_reporting_multiplier_sd: 0.40
      VE_sus:
        mean: 0.45
        sd: 0.08
        note: >
          Empirical aP susceptibility-reduction anchor; tightened SD (0.08) to prevent
          multimodality from beta_S/reporting_multiplier compensation. The posterior
          is constrained to [0.20, 0.70] which spans the literature range.
      VE_inf:
        mean: 0.25
        sd: 0.08
        note: >
          Prior centered on 0.25 representing the population-average effect
          of aP vaccination on onward infectiousness. Tightened SD (0.08) to
          prevent extreme values. Range [0.10, 0.45] spans from fully waned
          to recently boosted population-average estimates.
      VE_dur:
        mean: 0.10
        sd: 0.10
        note: Fixed at prior mean (0.10) during MCMC; not identifiable from aggregate case data.
      relative_infectiousness_asymptomatic:
        mean: 0.45
        sd: 0.12
        note: >
          Relative infectiousness of asymptomatic/subclinical infections
          compared to symptomatic cases. This parameter has high sensitivity
          for infant case projections (PRCC ~0.59 in LHS screening) because
          asymptomatic adult infections are the primary reservoir maintaining
          transmission to unvaccinated infants. Range [0.15, 0.75] spans from
          minimal subclinical transmission to near-equal infectiousness.
          WHO position paper (2015) notes subclinical infections contribute
          to transmission but at reduced efficiency.
      infectious_duration_symptomatic:
        log_sd: 0.20
      infectious_duration_asymptomatic:
        log_sd: 0.25
      fitness_R:
        min: 0.70
        max: 1.25
        mean: 1.00
        sd: 0.12
        note: >
          Prior centered on fitness-neutral (1.0) based on epidemiological
          evidence that MRBP reached near-fixation in China within 8 years
          and spread globally without apparent transmission disadvantage.
          SD of 0.12 allows the posterior to explore modest fitness costs
          (down to ~0.75) or advantages (up to ~1.25). The previous prior
          (mean 0.95, SD 0.18) was inconsistent with the observed rapid
          fixation dynamics.
      resistance_prevalence:
        floor_sd: 0.03
      reporting_trend:
        log_mean: 0.0
        log_sd: 0.40
        note: >
          Prior on the log of the reporting-trend end multiplier. Centered on
          log(1.0) = 0 (no secular change) with SD 0.40, allowing the posterior
          to learn whether reporting completeness has changed over the analysis
          period. The multiplier maps to [0.3, 3.0] via a scaled logit transform.
      maternal_VE_sus:
        mean: 0.55
        sd: 0.12
        note: >
          Prior for maternal antibody protection against infant infection.
          Centered on 0.55 based on Skoff et al. (2017) VE=77.7% against
          confirmed pertussis in <2mo infants (which combines infection
          prevention and disease prevention). The infection-blocking component
          is estimated at 50-60% (Amirthalingam et al. 2014; Baxter et al.
          2017). SD of 0.12 allows exploration of [0.30, 0.80].
      maternal_VE_sym:
        mean: 0.92
        sd: 0.05
        note: >
          Prior for maternal antibody protection against symptomatic disease
          given infection. High confidence based on consistent estimates of
          VE against hospitalization (>90%) across US, UK, and Argentina
          studies (Skoff 2017; Amirthalingam 2014; Romanin 2020). Narrow
          SD reflects strong evidence consensus.
    stochastic_overlay:
      enabled: true
      random_seed: 20260511
      replicates_per_draw: 200
      superspreading_k: 10.0
      superspreading_k_min: 1.0
      household_mean_size: 3.5
      household_secondary_attack_rate: 0.80
      min_expected_count: 1.0
      credible_interval:
        low: 2.5
        high: 97.5
      k_sensitivity_values: [5.0, 10.0, 20.0, 30.0, 50.0]
      note: >
        Negative-binomial observation overlay injecting two stochastic sources
        onto each deterministic posterior-predictive draw. Superspreading
        enters as an aggregate-scale NB2 dispersion k = 10 (empirical
        surveillance range 5-50; the calibration likelihood already uses
        dispersion = 50); this captures the tail of transmission
        heterogeneity (Lloyd-Smith et al. Nature 2005; Endo et al. 2020) that
        remains after aggregating individual-level offspring variability to
        country-year counts. Household clustering enters as the Ball,
        Mollison & Scalia-Tomba (1997) design effect
        DEFF = 1 + (m_bar - 1) * SAR with m_bar = 3.5 and pertussis
        household SAR = 0.8. Effective dispersion combines both via
        1/k_eff = 1/k_ss + (DEFF - 1)/mu so household clustering dominates at
        small mu while superspreading dominates at large mu. Combined 95% CrI
        is pooled over parameter draws and stochastic replicates; parameter-
        only and stochastic components are reported separately. The
        k_sensitivity_values sweep demonstrates how the combined CrI width
        varies across the plausible range of aggregate dispersion (k=5 to
        k=50), making the assumption explicit and auditable. Addresses
        Lavine et al. (2011) sensitivity concern by making both parameter
        uncertainty and structural heterogeneity explicit and decomposable.

parameter_sources:
  simulation.end_time:
    source: pertussis_cycle_model
    note: "Thirty analysis years gives roughly 7-10 candidate 3-5-year cycles after burn-in."
  simulation.burn_in_years:
    source: pertussis_cycle_model
    note: "Long burn-in reduces dependence on arbitrary initial infections and immunity."
  natural_history.latent_duration:
    source: cdc_clinical
    note: "Uses 8 days within CDC's common 7-10 day incubation range."
  natural_history.infectious_duration_symptomatic:
    source: cdc_clinical
    note: "Uses 21 days, aligned with infectiousness through roughly the third week after paroxysm onset."
  natural_history.infectious_duration_asymptomatic:
    source: cdc_clinical
    note: "Shorter infectious duration for mild/asymptomatic infections; sensitivity range should be retained."
  natural_history.recovered_immunity_duration:
    source: cdc_clinical
    note: "Uses 9 years within CDC's 4-20 year observational range; longer natural-immunity values remain sensitivity cases because the current ODE has no explicit immune-boosting state."
  natural_history.vaccine_protection_duration:
    source: ap_waning_meta_analysis
    note: "Uses 5 years to approximate rapid aP waning; meta-analysis shows marked decline by 3-7 years."
  transmission.seasonal_amplitude:
    source: pertussis_incidence
    note: "Country profiles override this from circular seasonal concentration of reported cases."
  transmission.beta_S:
    source: pertussis_incidence
    note: "Baseline default for scenario analysis; country-level calibration overrides this value per-country (see calibration results in eTable 8)."
  transmission.relative_infectiousness_asymptomatic:
    source: who_pertussis_position
    note: "Assumption for subclinical/mild transmission under aP-like protection; retained in sensitivity analysis."
  transmission.multi_year_period_years:
    source: pertussis_cycle_model
    note: "Country profiles infer 3-5-year periodicity from annual surveillance peaks when visible; otherwise use 4 years."
  transmission.multi_year_amplitude:
    source: pertussis_cycle_model
    note: "Weak phase-locking term; main interpretation remains susceptible depletion/replenishment plus seasonal forcing."
  age_groups.population:
    source: wpp_2024
    note: "Country profiles override placeholder populations with WPP one-year age groups."
  age_groups.vaccine_coverage:
    source: who_immunization_data
    note: "Country profiles override placeholder coverage using DTP coverage and schedule metadata."
  contact_matrix.rows:
    source: prem_contact_matrices
    note: "Country profiles override placeholder matrix with Prem/contactdata matrices aggregated to model age groups."
  treatment:
    source: cdc_treatment_pep
    note: "Sensitive-strain treatment and PEP assumptions reflect early macrolide benefit; resistant effect is a scenario assumption."
  PEP.coverage_household_contacts:
    source: cdc_treatment_pep
    note: "Approximation of household/close-contact PEP reach in an age-structured model without explicit households."
  vaccine_scenarios:
    source: who_pertussis_position
    note: "Scenario values encode mechanisms rather than product-specific effectiveness; aP-like scenario has high symptom protection and weak transmission blocking."
