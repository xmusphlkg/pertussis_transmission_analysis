simulation:
  start_time: 0
  end_time: 10950
  time_step: 1
  output_time_step: 7
  burn_in_years: 60
  solver_method: RK45
  rtol: 1.0e-05
  atol: 1.0e-07
  n_jobs: -1
calendar:
  enabled: true
  analysis_start_date: '2026-01-01'
  note: 'Simulation time is stored as days since analysis_start_date, and output
    rows include calendar_date/calendar_year. Calibration overrides this date to
    the first observed surveillance year so modelled and observed annual cases align
    by real calendar year, with reporting intervals split across calendar-year boundaries.

    '
age_groups:
- label: infant_0_2m
  population: 260000
  vaccine_coverage: 0.1
  symptom_probability: 0.75
  reporting_rate: 0.6
- label: infant_3_11m
  population: 980000
  vaccine_coverage: 0.65
  symptom_probability: 0.65
  reporting_rate: 0.5
- label: child_1_6y
  population: 7200000
  vaccine_coverage: 0.9
  symptom_probability: 0.45
  reporting_rate: 0.25
- label: school_7_17y
  population: 12600000
  vaccine_coverage: 0.72
  symptom_probability: 0.3
  reporting_rate: 0.1
- label: adult_18plus
  population: 78000000
  vaccine_coverage: 0.35
  symptom_probability: 0.2
  reporting_rate: 0.05
contact_matrix:
  reciprocity_correction:
    enabled: true
    method: population_weighted_average
    tolerance: 0.05
  rows:
  - - 5.5
    - 2.2
    - 1.2
    - 0.5
    - 1.0
  - - 1.8
    - 6.2
    - 2.6
    - 0.8
    - 1.2
  - - 0.7
    - 2.1
    - 9.0
    - 2.8
    - 1.4
  - - 0.3
    - 0.8
    - 3.0
    - 10.5
    - 2.6
  - - 0.4
    - 0.7
    - 1.3
    - 2.5
    - 6.0
transmission:
  beta_S: 0.03
  fitness_R: 0.7
  relative_infectiousness_asymptomatic: 0.35
  seasonal_amplitude: 0.18
  seasonal_phase: 30
  multi_year_amplitude: 0.0
  multi_year_period_years: 4.0
  multi_year_phase: 0
importation:
  enabled: true
  rate_per_100k_per_year: 0.2
  resistant_fraction: 0.3
  age_distribution:
    infant_0_2m: 0.03
    infant_3_11m: 0.07
    child_1_6y: 0.22
    school_7_17y: 0.43
    adult_18plus: 0.25
natural_history:
  latent_duration: 8.0
  infectious_duration_symptomatic: 21.0
  infectious_duration_asymptomatic: 14.0
  maternal_protection_duration: 90.0
  recovered_immunity_duration: 3285.0
  vaccine_protection_duration: 1825.0
immunity_model:
  mode: maternal_dose_history
  waned_relative_effect: 0.35
  maternal_relative_effect: 0.75
  dose1_relative_effect: 0.45
  dose2_relative_effect: 0.75
  waned_vaccine_duration: 3650.0
  initial_recent_fraction: 0.35
  initial_recent_fraction_by_age:
    infant_0_2m: 1.0
    infant_3_11m: 0.85
    child_1_6y: 0.55
    school_7_17y: 0.25
    adult_18plus: 0.1
observation_model:
  enabled: true
  structure: symptomatic_to_care_to_test_to_report
  note: 'Runtime reported cases use the age-specific final reporting probabilities
    in age_groups/reporting_rate, with calibration allowed to multiply those probabilities.
    The explicit care/test/report split is retained as the intended observation contract
    for country calibration.

    '
resistance:
  target_prevalence_at_analysis_start: 0.3
  importation_fraction: 0.3
  rebalance_after_burn_in: true
  prevalence_anchor_rate_per_year: 2.0
  anchor_during_dynamics: false
  initial_resistance_prevalence_deprecated: true
calibration:
  enabled: false
  default_country_profile: Australia
  method: staged_fast
  objective: negative_binomial_annual_reported_cases
  dispersion: 50.0
  maxiter: 12
  n_starts: 1
  recent_years: 6
  simulation_overrides:
    burn_in_years: 5
    output_time_step: 30
    solver_method: RK45
    rtol: 0.0001
    atol: 1.0e-06
  relative_incidence_tolerance: 0.25
  fit_parameters:
  - transmission.beta_S
  - reporting_multiplier
  - transmission.seasonal_amplitude
  - importation.rate_per_100k_per_year
  - resistance.importation_fraction
demography:
  enabled: true
  fixed_population_profile: true
  fixed_population_reference_age_group: infant_0_2m
  maternal_protection_proxy:
    enabled: true
    exit_age_groups:
    - infant_0_2m
    exit_to_compartment: S
    note: 'Birth-entry M_protected is a proxy for short-lived maternally derived
      infant protection. It is converted back to susceptible when infants age out
      of 0-2 months so maternal antibodies are not treated as multi-year vaccine-derived
      immunity.

      '
  age_bin_durations_years:
    infant_0_2m: 0.1667
    infant_3_11m: 0.75
    child_1_6y: 6.0
    school_7_17y: 11.0
    adult_18plus: 62.0
  birth_entry:
    S: 0.92
    V: 0.08
routine_vaccination:
  enabled: true
  target_relaxation_rate_per_year: 2.0
initial_conditions:
  initial_exposed_per_100k: 1.5
  initial_infectious_per_100k: 0.6
  initial_resistance_prevalence: 0.3
  seed_age_distribution:
    infant_0_2m: 0.05
    infant_3_11m: 0.1
    child_1_6y: 0.22
    school_7_17y: 0.38
    adult_18plus: 0.25
treatment:
  treatment_rate_symptomatic: 0.05
  treatment_rate_asymptomatic: 0.005
  sensitive:
    infectious_duration_reduction: 0.6
    infectiousness_reduction: 0.5
  resistant:
    infectious_duration_reduction: 0.1
    infectiousness_reduction: 0.05
PEP:
  coverage_household_contacts: 0.3
  effectiveness_sensitive: 0.7
  effectiveness_resistant: 0.1
  activation_prevalence: 2.0e-05
reporting_rate_sensitivity:
  medium:
    multiplier: 1.0
  high:
    multiplier: 1.5
  low:
    multiplier: 0.5
  age_biased:
    age_multipliers:
      infant_0_2m: 1.2
      infant_3_11m: 1.1
      child_1_6y: 0.8
      school_7_17y: 0.7
      adult_18plus: 0.6
  time_varying:
    multiplier: 1.0
    time_variation:
      start_multiplier: 0.5
      end_multiplier: 1.5
baseline_vaccine_scenario: symptom_protective
baseline_resistance_scenario: country_timeline
baseline_country_profile: China
